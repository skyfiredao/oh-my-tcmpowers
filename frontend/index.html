        const text = await res.text();
        if (!text) return {};
        return safeJSON(text) || {};
      }

      async function apiFetchRaw(path, opts = {}) {
        const method = opts.method || 'GET';
        const url = buildURL(path, opts.query || {}, opts.instance !== false);
        const headers = buildHeaders(opts.instance !== false);
        let body = undefined;
        if (opts.body !== undefined) {
          headers['Content-Type'] = 'application/json';
          body = JSON.stringify(opts.body);
        }
        const res = await fetch(url, { method, headers, body });
        if (!res.ok && !(opts.expectNoContent && res.status === 204)) {
          let errText = '';
          try { errText = await res.text(); } catch (_) {}
          throw new Error(`请求失败 ${res.status} ${errText}`);
        }
        return res;
      }

      function buildURL(path, query, isInstance) {
        const base = (state.settings.serverUrl || '').replace(/\/$/, '');
        if (!/^https?:\/\//i.test(base)) {
          throw new Error('服务地址协议无效，仅支持 http:// 或 https://');
        }
        const url = new URL(base + path);
        const q = query || {};
        Object.keys(q).forEach((k) => {
          if (q[k] !== undefined && q[k] !== null && q[k] !== '') url.searchParams.set(k, q[k]);
        });
        if (isInstance && state.settings.directory) {
          url.searchParams.set('directory', state.settings.directory);
        }
        return url.toString();
      }

      function buildHeaders(isInstance) {
        const headers = { Accept: 'application/json' };
        if (state.settings.password) {
          const user = state.settings.username || 'opencode';
          headers['Authorization'] = 'Basic ' + encodeBase64(`${user}:${state.settings.password}`);
        }
        if (isInstance && state.settings.directory) headers['x-opencode-directory'] = state.settings.directory;
        return headers;
      }

      function renderRichText(text) {
        const source = String(text || '');
        if (window.marked && typeof window.marked.parse === 'function') {
          try {
            if (typeof window.marked.setOptions === 'function') {
              window.marked.setOptions({ breaks: true, gfm: true });
            }
            const raw = window.marked.parse(source);
            const safe = sanitizeHtml(raw);
            const tpl = document.createElement('template');
            tpl.innerHTML = safe;
            return tpl.innerHTML;
          } catch (_) { /* fallback below */ }
        }
        return escapeHtml(source).replace(/\n/g, '<br/>');
      }

      function sanitizeHtml(html) {
        if (window.DOMPurify && typeof window.DOMPurify.sanitize === 'function') {
          return window.DOMPurify.sanitize(html, {
            USE_PROFILES: { html: true }
          });
        }
        const parser = new DOMParser();
        const doc = parser.parseFromString(String(html || ''), 'text/html');
        doc.querySelectorAll('script,iframe,object,embed,link,meta,style,base,form,svg,math').forEach((n) => { n.remove(); });
        doc.querySelectorAll('*').forEach((el) => {
          Array.from(el.attributes).forEach((attr) => {
            const name = attr.name.toLowerCase();
            const value = String(attr.value || '');
            if (name.startsWith('on')) el.removeAttribute(attr.name);
            if ((name === 'href' || name === 'src') && /^\s*(javascript|data):/i.test(value)) {
              el.removeAttribute(attr.name);
            }
          });
        });
        return doc.body.innerHTML;
      }

      function scrollMessagesToBottom() {
        ui.messageList.scrollTop = ui.messageList.scrollHeight;
      }

      function tip(msg, duration) {
        ui.connText.textContent = msg;
        if (tipTimer) clearTimeout(tipTimer);
        tipTimer = setTimeout(() => updateConnectionUI(), duration || 3000);
      }
      let tipTimer = null;

      function safeJSON(text) {
        try { return JSON.parse(text); } catch (_) { return null; }
      }

      function encodeBase64(str) {
        try { return btoa(unescape(encodeURIComponent(str))); } catch (_) { return ''; }
      }

      function decodeBase64(str) {
        if (!str) return '';
        try { return decodeURIComponent(escape(atob(str))); } catch (_) { return ''; }
      }

      function escapeHtml(s) {
        return String(s || '').replace(/[&<>'"]/g, (ch) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
      }

      function escapeAttr(s) {
        return escapeHtml(s).replace(/`/g, '&#96;');
      }
    })();
  </script>
</body>
</html>
